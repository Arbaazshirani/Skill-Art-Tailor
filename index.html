<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Tailor - Billing & Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf7; color: #334155; touch-action: manipulation; }

        .handwriting-pad { 
            background: #fffef0; 
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 100% 2rem;
            cursor: crosshair; 
        }

        .lang-radio:checked + label { background-color: #78350f; color: white; border-color: #78350f; }

        .green-dot {
            height: 12px; width: 12px; background-color: #22c55e;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-green 1.5s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .garment-card { transition: all 0.2s ease; cursor: pointer; border: 2px solid #e2e8f0; }
        .garment-card.selected { border-color: #22c55e; background-color: #f0fdf4; }

        .nav-tab.active { background-color: #78350f; color: white; }

        .chart-container { position: relative; width: 100%; max-width: 400px; margin: auto; height: 300px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Header -->
    <header class="no-print bg-white border-b h-20 flex items-center justify-between px-6 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-amber-800 rounded-xl flex items-center justify-center text-white text-2xl font-bold">RT</div>
            <div class="hidden sm:block">
                <h1 class="text-xl font-bold tracking-tight text-amber-900 uppercase">Royal Tailor</h1>
                <p class="text-[10px] uppercase tracking-widest text-gray-400" id="header-sub">Digital Billing System</p>
            </div>
        </div>

        <!-- Language Selector (English Default) -->
        <div class="flex bg-gray-100 p-1 rounded-xl border border-gray-200">
            <input type="radio" name="lang" id="lang-en" value="en" class="lang-radio hidden" checked onchange="changeLang('en')">
            <label for="lang-en" class="px-5 py-1.5 text-xs font-bold cursor-pointer rounded-lg transition-all">English</label>
            <input type="radio" name="lang" id="lang-hi" value="hi" class="lang-radio hidden" onchange="changeLang('hi')">
            <label for="lang-hi" class="px-5 py-1.5 text-xs font-bold cursor-pointer rounded-lg transition-all">हिन्दी</label>
        </div>

        <div class="flex gap-2">
            <button onclick="switchTab('billing')" class="nav-tab active px-4 py-2 rounded-lg text-sm font-bold border transition-all" id="nav-bill">New Bill</button>
            <button onclick="switchTab('dashboard')" class="nav-tab px-4 py-2 rounded-lg text-sm font-bold border transition-all" id="nav-dash">Dashboard</button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-5xl">
        
        <!-- Search Bar (Global) -->
        <div class="relative max-w-xl mx-auto no-print my-4">
            <input type="text" id="globalSearch" class="w-full bg-white border border-gray-200 rounded-2xl py-3 px-12 shadow-sm focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Search customer records...">
            <span class="absolute left-4 top-3 text-lg opacity-30">🔍</span>
        </div>

        <!-- BILLING SECTION -->
        <div id="tab-billing" class="tab-content space-y-6">
            
            <!-- Part 1: Customer Details -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2 mb-6" id="title-part1">Customer Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider" id="label-name">Full Name</label>
                        <input type="text" id="custName" class="w-full border-b-2 border-gray-100 py-2 focus:border-amber-500 outline-none font-semibold" placeholder="Enter Name">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider" id="label-mobile">Mobile Number</label>
                        <input type="tel" id="custMobile" class="w-full border-b-2 border-gray-100 py-2 outline-none font-mono font-bold" placeholder="Numeric Pad">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider" id="label-email">Email Address</label>
                        <input type="email" id="custEmail" class="w-full border-b-2 border-gray-100 py-2 outline-none" placeholder="example@mail.com">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider" id="label-address">Address</label>
                        <input type="text" id="custAddress" class="w-full border-b-2 border-gray-100 py-2 outline-none" placeholder="City/Area">
                    </div>
                </div>
            </div>

            <!-- Part 2: Garment Selection -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-6" id="title-part2">Select Garments</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="garment-grid">
                    <!-- Injected via JS -->
                </div>
                <div class="mt-8 flex justify-center border-t pt-6">
                    <button onclick="goToMeasurements()" class="bg-amber-800 text-white px-10 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-xl active:scale-95 transition-all">
                        <span id="btn-go-to-pad">Start Measuring</span> ✍️
                    </button>
                </div>
            </div>

            <!-- Part 3: Handwriting Notepad (Stylus Pad) -->
            <div id="notepad-section" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800" id="label-notes">Measurement Note Pad</h2>
                    <button onclick="clearCanvas()" class="px-4 py-1 text-xs font-bold text-red-500 border border-red-100 rounded-lg">Clear All</button>
                </div>
                <div class="border-2 border-amber-100 rounded-2xl overflow-hidden shadow-inner bg-white">
                    <canvas id="measCanvas" class="handwriting-pad w-full"></canvas>
                </div>
                <div class="mt-6 flex justify-end gap-4">
                    <button class="bg-gray-100 text-gray-600 px-8 py-4 rounded-xl font-bold border hover:bg-gray-200">Edit Details</button>
                    <button class="bg-amber-800 text-white px-12 py-4 rounded-xl font-bold shadow-lg" id="btn-submit">Preview & Save Bill</button>
                </div>
            </div>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="tab-dashboard" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Pricing Manager -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-bold mb-6" id="dash-title-pricing">Pricing Management (₹)</h2>
                    <div id="pricing-list" class="space-y-4">
                        <!-- Injected via JS -->
                    </div>
                </div>
                <!-- Analytics -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-bold mb-6" id="dash-title-stats">Stitch Price Stats</h2>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const i18n = {
            hi: {
                navBill: "नया बिल", navDash: "डैशबोर्ड", titlePart1: "ग्राहक विवरण",
                titlePart2: "कपड़े चुनें", labelName: "नाम", labelMobile: "मोबाइल",
                labelEmail: "ईमेल", labelAddress: "पता", labelNotes: "माप नोटपैड (Stylus)",
                btnSubmit: "बिल देखें", headerSub: "डिजिटल रिकॉर्ड",
                searchPlaceholder: "ग्राहक खोजें...", btnGoToPad: "माप शुरू करें",
                dashPricing: "रेट मैनेजमेंट", dashStats: "मूल्य वितरण"
            },
            en: {
                navBill: "New Bill", navDash: "Dashboard", titlePart1: "Customer Details",
                titlePart2: "Select Garments", labelName: "Full Name", labelMobile: "Mobile Number",
                labelEmail: "Email Address", labelAddress: "Address", labelNotes: "Measurement Note Pad",
                btnSubmit: "Preview & Save Bill", headerSub: "Digital Billing System",
                searchPlaceholder: "Search customer records...", btnGoToPad: "Start Measuring",
                dashPricing: "Pricing Management", dashStats: "Stitch Price Stats"
            }
        };

        const garments = ["Shirt", "Pent", "Kurta", "Payjama", "Coat", "Sherwani", "Jacket", "Waistcoat"];
        let prices = { Shirt: 350, Pent: 400, Kurta: 450, Payjama: 250, Coat: 2500, Sherwani: 4500, Jacket: 1200, Waistcoat: 800 };
        let quantities = {};
        let selectedGarments = new Set();
        let currentLang = 'en';
        let chartInstance = null;

        window.onload = () => {
            garments.forEach(g => quantities[g] = 0);
            renderGarments();
            renderPricingDashboard();
            initCanvas();
            initChart();
            changeLang('en');
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            event.currentTarget.classList.add('active');
            if(tab === 'dashboard') updateChart();
        }

        function changeLang(lang) {
            currentLang = lang;
            const t = i18n[lang];
            document.getElementById('nav-bill').innerText = t.navBill;
            document.getElementById('nav-dash').innerText = t.navDash;
            document.getElementById('header-sub').innerText = t.headerSub;
            document.getElementById('title-part1').innerText = t.titlePart1;
            document.getElementById('title-part2').innerText = t.titlePart2;
            document.getElementById('label-name').innerText = t.labelName;
            document.getElementById('label-mobile').innerText = t.labelMobile;
            document.getElementById('label-email').innerText = t.labelEmail;
            document.getElementById('label-address').innerText = t.labelAddress;
            document.getElementById('label-notes').innerText = t.labelNotes;
            document.getElementById('btn-go-to-pad').innerText = t.btnGoToPad;
            document.getElementById('btn-submit').innerText = t.btnSubmit;
            document.getElementById('globalSearch').placeholder = t.searchPlaceholder;
            document.getElementById('dash-title-pricing').innerText = t.dashPricing;
            document.getElementById('dash-title-stats').innerText = t.dashStats;
            renderGarments();
        }

        function renderGarments() {
            const grid = document.getElementById('garment-grid');
            grid.innerHTML = garments.map(item => `
                <div onclick="toggleSelection('${item}')" class="garment-card p-4 rounded-2xl bg-white flex flex-col relative ${selectedGarments.has(item) ? 'selected' : ''}">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-sm font-bold text-gray-700">${item}</span>
                        ${selectedGarments.has(item) ? '<span class="green-dot"></span>' : '<span class="w-3 h-3 border rounded-full border-gray-200"></span>'}
                    </div>
                    <div class="flex items-center justify-between bg-gray-50 rounded-xl p-1 mt-auto" onclick="event.stopPropagation()">
                        <button onclick="updateQty('${item}', -1)" class="w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center font-bold text-gray-400 hover:text-amber-800 transition-colors">-</button>
                        <span class="font-mono font-bold text-amber-900">${quantities[item]}</span>
                        <button onclick="updateQty('${item}', 1)" class="w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center font-bold text-gray-400 hover:text-amber-800 transition-colors">+</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleSelection(item) {
            if (selectedGarments.has(item)) selectedGarments.delete(item);
            else selectedGarments.add(item);
            renderGarments();
        }

        function updateQty(item, delta) {
            quantities[item] = Math.max(0, quantities[item] + delta);
            if(quantities[item] > 0) selectedGarments.add(item);
            renderGarments();
        }

        function renderPricingDashboard() {
            const list = document.getElementById('pricing-list');
            list.innerHTML = garments.map(item => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                    <span class="font-bold text-gray-600">${item}</span>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-gray-400">₹</span>
                        <input type="number" value="${prices[item]}" onchange="prices['${item}']=parseInt(this.value)" class="w-24 text-right border rounded-lg px-2 py-1 font-mono outline-amber-500">
                    </div>
                </div>
            `).join('');
        }

        // --- WRITING PAD FIXED LOGIC ---

        function goToMeasurements() {
            if (selectedGarments.size === 0) {
                alert(currentLang === 'hi' ? "कृपया पहले कपड़े चुनें" : "Please select garments first");
                return;
            }
            document.getElementById('notepad-section').scrollIntoView({ behavior: 'smooth' });
            
            // Sync Canvas Labels with current selection
            setTimeout(() => {
                drawLabelsOnPad();
            }, 300);
        }

        function drawLabelsOnPad() {
            const canvas = document.getElementById('measCanvas');
            const ctx = canvas.getContext('2d');
            
            // 1. CLEAR EVERYTHING (This fixes the "old name not disappearing" bug)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 2. Set Canvas Scale
            canvas.width = canvas.offsetWidth;
            canvas.height = 1000; // Increased height for long lists

            // 3. Draw only CURRENTLY selected garments
            ctx.font = "bold 28px 'Inter', sans-serif";
            ctx.fillStyle = "#0f172a";
            ctx.textBaseline = "top";
            
            let y = 40;
            // Iterate through the current Set (the single source of truth)
            selectedGarments.forEach(item => {
                // Draw Label
                ctx.fillText(item.toLowerCase() + ":", 40, y);
                
                // Draw Guide Line
                ctx.beginPath();
                ctx.setLineDash([5, 10]);
                ctx.moveTo(40, y + 45);
                ctx.lineTo(canvas.width - 40, y + 45);
                ctx.strokeStyle = "#cbd5e1";
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.setLineDash([]); 
                
                y += 160; // Space for writing
            });

            // 4. Re-init pen styles
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1e293b'; 
        }

        let drawing = false;
        function initCanvas() {
            const canvas = document.getElementById('measCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = 1000;
            
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                return { x, y };
            };

            const start = (e) => { drawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
            const draw = (e) => { if (!drawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
            const stop = () => drawing = false;

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stop);
        }

        function clearCanvas() {
            const canvas = document.getElementById('measCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Redraw only currently selected garment names
            if(selectedGarments.size > 0) drawLabelsOnPad();
        }

        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: garments,
                    datasets: [{
                        data: garments.map(g => prices[g]),
                        backgroundColor: ['#78350f', '#92400e', '#b45309', '#d97706', '#f59e0b', '#fbbf24', '#fcd34d', '#fef3c7']
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
            });
        }

        function updateChart() {
            if(chartInstance) {
                chartInstance.data.datasets[0].data = garments.map(g => prices[g]);
                chartInstance.update();
            }
        }
    </script>
</body>
</html>
